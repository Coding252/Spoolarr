name: CI\xe2\x80\x94Build and Test

on:
  pull_request:
    branches:
      - master
      - develop
  push:
    branches:
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore Spoolarr.sln

      - name: Build solution
        run: dotnet build Spoolarr.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test Spoolarr.sln --no-build --configuration Release --verbosity normal
