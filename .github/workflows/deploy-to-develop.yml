name: Deploy to Develop

on:
  pull_request:
    branches:
      - develop
    types:
      - closed

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/backend/backend.sln

      - name: Build
        run: dotnet build src/backend/backend.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/backend/backend.sln --no-build --configuration Release

      - name: Deploy to Development Environment
        run: echo "Deploying to Development Environment — Docker deployment will be wired up in M0-S6"

      - name: Delete Branch
        run: git push --delete origin ${{ github.event.pull_request.head.ref }}
